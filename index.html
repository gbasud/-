<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="말씀암송">
<meta name="theme-color" content="#0a0f1a">
<title>말씀 암송</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0f1a;
  --surface: #111827;
  --surface2: #1a2236;
  --border: #1e2d47;
  --gold: #c9943a;
  --gold-light: #e8bc6a;
  --gold-dim: #7a5a20;
  --text: #e8e4d8;
  --text-muted: #7a8499;
  --text-dim: #2e3a4e;
  --green: #4ade80;
  --green-bg: #052010;
  --red: #f87171;
  --red-bg: #200808;
  --blue: #60a5fa;
  --blue-bg: #071428;

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ===== APP SHELL ===== */
.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
  padding-top: var(--safe-top);
}

/* ===== TOP BAR ===== */
.topbar {
  flex-shrink: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.topbar-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--gold-light);
  letter-spacing: 1px;
}
.topbar-sub {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 1px;
  letter-spacing: 0.5px;
}
.topbar-cross { font-size: 16px; color: var(--gold); opacity: 0.6; letter-spacing: 4px; }

/* ===== SCROLL AREA ===== */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(80px + var(--safe-bottom));
}

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  flex-shrink: 0;
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  background: rgba(10,15,26,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-bottom);
  z-index: 100;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 4px 10px;
  cursor: pointer;
  border: none;
  background: transparent;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.nav-icon { font-size: 20px; opacity: 0.4; transition: all 0.15s; }
.nav-label { font-size: 10px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.3px; transition: all 0.15s; }
.nav-item.active .nav-icon { opacity: 1; }
.nav-item.active .nav-label { color: var(--gold); }

/* ===== SECTIONS ===== */
.section { display: none; padding: 16px; }
.section.active { display: block; }

/* ===== SECTION HEADER ===== */
.section-header {
  margin-bottom: 16px;
}
.section-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.section-desc { font-size: 12px; color: var(--text-muted); }

/* ===== CARDS ===== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 14px;
}
.card-accent { border-color: var(--gold-dim); }

/* ===== FORM ===== */
.form-label { font-size: 11px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 7px; display: block; }
.form-row { display: flex; gap: 8px; margin-bottom: 12px; }
.form-group { flex: 1; }
.form-group.small { flex: 0 0 80px; }

input[type="text"], textarea, select {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  padding: 12px 14px;
  transition: border-color 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
input[type="text"]:focus, textarea:focus {
  outline: none;
  border-color: var(--gold-dim);
}
textarea {
  resize: none;
  height: 90px;
  line-height: 1.7;
}

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 13px 20px;
  border: none;
  border-radius: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.2px;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--gold); color: #0a0f1a; }
.btn-primary:active { background: var(--gold-light); }
.btn-full { width: 100%; padding: 15px; font-size: 15px; border-radius: 14px; }
.btn-ghost { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
.btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,113,113,0.2); font-size: 13px; padding: 8px 14px; }
.btn-sm { padding: 9px 14px; font-size: 13px; border-radius: 10px; }

/* ===== STATS ROW ===== */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 18px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 10px;
  text-align: center;
}
.stat-num {
  font-family: 'Noto Serif KR', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 4px;
}
.stat-label { font-size: 10px; color: var(--text-muted); }

/* ===== VERSE LIST ===== */
.verse-list { display: flex; flex-direction: column; gap: 10px; }
.verse-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.verse-num-badge {
  flex-shrink: 0;
  background: rgba(201,148,58,0.12);
  border: 1px solid rgba(201,148,58,0.25);
  border-radius: 8px;
  padding: 5px 9px;
  font-family: 'Noto Serif KR', serif;
  font-size: 11px;
  color: var(--gold);
  text-align: center;
  min-width: 62px;
  line-height: 1.4;
}
.verse-body { flex: 1; min-width: 0; }
.verse-ref {
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  color: var(--gold);
  margin-bottom: 4px;
  font-weight: 600;
}
.verse-content {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.verse-btns { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }

.empty-state {
  text-align: center;
  padding: 52px 20px;
  color: var(--text-dim);
}
.empty-icon { font-size: 42px; margin-bottom: 14px; display: block; opacity: 0.3; }
.empty-text { font-size: 14px; color: var(--text-muted); line-height: 1.7; }

/* ===== MODE CARDS ===== */
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.mode-card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 22px 14px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
}
.mode-card:active { transform: scale(0.97); }
.mode-card.selected {
  border-color: var(--gold);
  background: rgba(201,148,58,0.07);
}
.mode-icon { font-size: 30px; margin-bottom: 10px; }
.mode-title { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
.mode-desc { font-size: 11px; color: var(--text-muted); line-height: 1.5; }

/* ===== QUIZ PLAY ===== */
.quiz-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.quiz-progress-text { font-size: 12px; color: var(--text-muted); }
.progress-wrap {
  height: 3px;
  background: var(--surface2);
  border-radius: 3px;
  margin-bottom: 28px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  border-radius: 3px;
  transition: width 0.5s ease;
}

.quiz-ref-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px; }
.quiz-ref {
  font-family: 'Noto Serif KR', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--gold-light);
  margin-bottom: 28px;
  letter-spacing: 1px;
}

.quiz-input {
  width: 100%;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 14px;
  color: var(--text);
  font-family: 'Noto Serif KR', serif;
  font-size: 16px;
  padding: 16px;
  resize: none;
  height: 130px;
  line-height: 1.8;
  margin-bottom: 12px;
  -webkit-appearance: none;
}
.quiz-input:focus { outline: none; border-color: var(--gold-dim); }

.quiz-btn-row { display: flex; gap: 10px; }
.quiz-btn-row .btn-ghost { flex: 1; }
.quiz-btn-row .btn-primary { flex: 2; }

/* ===== RESULT ===== */
.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  margin-top: 16px;
}
.score-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 16px;
}
.score-big {
  font-family: 'Noto Serif KR', serif;
  font-size: 40px;
  font-weight: 700;
  line-height: 1;
}
.score-perfect { color: var(--gold-light); }
.score-good { color: var(--green); }
.score-bad { color: var(--red); }
.score-sub { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
.score-badges { display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }
.badge {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 9px;
  border-radius: 6px;
}
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-blue { background: var(--blue-bg); color: var(--blue); }

.diff-label { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; letter-spacing: 0.5px; }
.diff-text {
  font-family: 'Noto Serif KR', serif;
  font-size: 15px;
  line-height: 2.4;
  word-break: keep-all;
}
.w-ok { color: var(--text); }
.w-miss {
  background: var(--red-bg);
  color: var(--red);
  border-radius: 5px;
  padding: 2px 6px;
}
.w-ans {
  font-size: 11px;
  background: var(--green-bg);
  color: var(--green);
  border-radius: 4px;
  padding: 1px 5px;
  margin-left: 3px;
}
.w-extra {
  background: var(--blue-bg);
  color: var(--blue);
  border-radius: 5px;
  padding: 2px 6px;
}

.answer-box {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.answer-box-label { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.5px; }
.answer-box-text {
  font-family: 'Noto Serif KR', serif;
  font-size: 15px;
  color: var(--green);
  line-height: 1.9;
}

.result-actions { display: flex; gap: 10px; margin-top: 16px; }
.result-actions .btn { flex: 1; }

/* ===== COMPLETE ===== */
.complete-wrap {
  padding: 28px 0;
  text-align: center;
}
.complete-cross {
  font-size: 36px;
  color: var(--gold);
  opacity: 0.6;
  letter-spacing: 8px;
  margin-bottom: 20px;
}
.complete-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 24px;
  color: var(--gold-light);
  margin-bottom: 8px;
}
.complete-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
.complete-stats {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 24px;
}
.complete-stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 20px;
}
.complete-stat-num {
  font-family: 'Noto Serif KR', serif;
  font-size: 30px;
  font-weight: 700;
  color: var(--gold);
}
.complete-stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.result-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; text-align: left; }
.result-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.result-row-ref { font-family: 'Noto Serif KR', serif; font-size: 13px; color: var(--text-muted); }
.result-row-score { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; }

.complete-btns { display: flex; gap: 10px; }
.complete-btns .btn { flex: 1; }

/* ===== HISTORY ===== */
.history-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.history-score {
  font-family: 'Noto Serif KR', serif;
  font-size: 28px;
  font-weight: 700;
  flex-shrink: 0;
  min-width: 52px;
  text-align: center;
}
.history-info { flex: 1; }
.history-date { font-size: 11px; color: var(--text-muted); margin-bottom: 5px; }
.history-detail { font-size: 13px; color: var(--text); }

/* ===== INSTALL PROMPT ===== */
.install-banner {
  background: linear-gradient(135deg, rgba(201,148,58,0.12), rgba(201,148,58,0.05));
  border: 1px solid var(--gold-dim);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.install-icon { font-size: 24px; flex-shrink: 0; }
.install-text { flex: 1; }
.install-text strong { font-size: 13px; color: var(--gold-light); display: block; margin-bottom: 2px; }
.install-text span { font-size: 11px; color: var(--text-muted); }
.install-btns { display: flex; flex-direction: column; gap: 5px; }

/* ===== TOGGLE ===== */
.toggle-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.toggle-row:last-child { border-bottom: none; }
.toggle-info { flex: 1; }
.toggle-title { font-size: 14px; color: var(--text); margin-bottom: 2px; }
.toggle-desc { font-size: 11px; color: var(--text-muted); }
.toggle-switch {
  position: relative;
  width: 44px;
  height: 26px;
  flex-shrink: 0;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 13px;
  cursor: pointer;
  transition: 0.2s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 18px;
  height: 18px;
  left: 3px;
  top: 3px;
  background: var(--text-muted);
  border-radius: 50%;
  transition: 0.2s;
}
.toggle-switch input:checked + .toggle-slider { background: rgba(201,148,58,0.2); border-color: var(--gold-dim); }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(18px); background: var(--gold); }

/* ===== RANGE INPUT ===== */
.range-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* scrollbar */
::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<div class="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div>
      <div class="topbar-title">말씀 암송</div>
      <div class="topbar-sub">개역한글 성경</div>
    </div>
    <div class="topbar-cross">✦✦✦</div>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll-area" id="scroll-area">

    <!-- ===== 구절 관리 ===== -->
    <div class="section active" id="sec-manage">
      <div id="install-banner-wrap"></div>

      <div id="stats-row-wrap"></div>

      <!-- Add form -->
      <div class="card card-accent" style="margin-bottom:16px;">
        <div class="section-title" style="font-size:16px;margin-bottom:14px;" id="form-title">구절 추가</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">책 이름</label>
            <input type="text" id="inp-book" placeholder="요한복음" autocomplete="off">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group small">
            <label class="form-label">장</label>
            <input type="text" id="inp-chapter" placeholder="3" inputmode="numeric">
          </div>
          <div class="form-group small">
            <label class="form-label">절</label>
            <input type="text" id="inp-verse" placeholder="16" inputmode="numeric">
          </div>
        </div>
        <div style="margin-bottom:14px;">
          <label class="form-label">구절 내용</label>
          <textarea id="inp-content" placeholder="하나님이 세상을 이처럼 사랑하사..."></textarea>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost btn-sm" onclick="clearForm()">초기화</button>
          <button class="btn btn-primary" style="flex:1;" id="form-submit-btn" onclick="addVerse()">＋ 추가하기</button>
        </div>
      </div>

      <!-- Verse list -->
      <div style="margin-bottom:10px; display:flex; align-items:center; justify-content:space-between;">
        <span style="font-size:13px;color:var(--text-muted);">등록된 구절</span>
        <span id="verse-count-badge" style="font-size:12px;color:var(--gold);font-weight:600;"></span>
      </div>
      <!-- 책 목록 -->
      <div id="book-list"></div>
      <!-- 구절 상세 -->
      <div id="verse-detail" style="display:none;">
        <div id="verse-detail-header" style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
          <button class="btn btn-ghost btn-sm" onclick="closeBookDetail()" style="padding:8px 14px;">← 목록</button>
          <span id="verse-detail-title" style="font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;color:var(--gold-light);"></span>
        </div>
        <div class="verse-list" id="verse-list"></div>
      </div>
    </div>

    <!-- ===== 암송 시작 ===== -->
    <div class="section" id="sec-quiz">
      <!-- Setup -->
      <div id="quiz-setup">
        <div class="section-header">
          <div class="section-title">암송 시작</div>
          <div class="section-desc">모드를 선택하고 시작하세요</div>
        </div>

        <div class="mode-grid">
          <div class="mode-card selected" id="mode-seq" onclick="selectMode('sequential')">
            <div class="mode-icon">📋</div>
            <div class="mode-title">순서 모드</div>
            <div class="mode-desc">등록된 순서대로 출제</div>
          </div>
          <div class="mode-card" id="mode-rnd" onclick="selectMode('random')">
            <div class="mode-icon">🎲</div>
            <div class="mode-title">무작위</div>
            <div class="mode-desc">랜덤으로 섞어서 출제</div>
          </div>
        </div>

        <div class="card" style="margin-bottom:14px;">
          <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;">출제 범위</div>
          <div class="range-row">
            <div>
              <label class="form-label">시작 번호</label>
              <input type="text" id="range-from" placeholder="1 (기본)" inputmode="numeric">
            </div>
            <div>
              <label class="form-label">끝 번호</label>
              <input type="text" id="range-to" placeholder="끝 (기본)" inputmode="numeric">
            </div>
          </div>
        </div>

        <div class="card" style="margin-bottom:20px;">
          <div class="toggle-row" style="padding-top:0;">
            <div class="toggle-info">
              <div class="toggle-title">오탈자 허용</div>
              <div class="toggle-desc">1글자 차이까지 정답으로 인정</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="fuzzy-check" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <button class="btn btn-primary btn-full" onclick="startQuiz()">암송 시작 →</button>
      </div>

      <!-- Play -->
      <div id="quiz-play" style="display:none;">
        <div class="quiz-topbar">
          <div class="quiz-progress-text" id="quiz-prog-text"></div>
          <button class="btn btn-ghost btn-sm" onclick="endQuiz()">✕ 종료</button>
        </div>
        <div class="progress-wrap">
          <div class="progress-fill" id="prog-fill"></div>
        </div>

        <div class="quiz-ref-label">암송할 구절</div>
        <div class="quiz-ref" id="quiz-ref-disp"></div>

        <textarea class="quiz-input" id="quiz-input-area" placeholder="외운 내용을 입력하세요..."></textarea>

        <div class="quiz-btn-row">
          <button class="btn btn-ghost" onclick="skipVerse()">건너뛰기</button>
          <button class="btn btn-primary" onclick="submitAnswer()">채점하기 ✓</button>
        </div>

        <div id="result-area"></div>
      </div>
    </div>

    <!-- ===== 기록 ===== -->
    <div class="section" id="sec-history">
      <div id="history-list"></div>
    </div>

  </div><!-- /scroll-area -->

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="showSection('manage', this)">
      <span class="nav-icon">📖</span>
      <span class="nav-label">구절 관리</span>
    </button>
    <button class="nav-item" onclick="showSection('quiz', this)">
      <span class="nav-icon">✍️</span>
      <span class="nav-label">암송 시작</span>
    </button>
    <button class="nav-item" onclick="showSection('history', this)">
      <span class="nav-icon">📊</span>
      <span class="nav-label">기록</span>
    </button>
  </nav>
</div>

<script>
// ==================== STATE ====================
let verses = [];
let sessionHistory = [];
let quizMode = 'sequential';
let quizQueue = [];
let quizIndex = 0;
let quizResults = [];
let editingId = null;
let deferredInstall = null;

const SK = 'bible_v2';
const HK = 'bible_hist_v2';

// ==================== STORAGE ====================
function load() {
  try { verses = JSON.parse(localStorage.getItem(SK)) || []; } catch { verses = []; }
  try { sessionHistory = JSON.parse(localStorage.getItem(HK)) || []; } catch { sessionHistory = []; }
}
function save() { localStorage.setItem(SK, JSON.stringify(verses)); }
function saveHist() { localStorage.setItem(HK, JSON.stringify(sessionHistory.slice(0, 60))); }

// ==================== NAV ====================
function showSection(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  btn.classList.add('active');
  document.getElementById('scroll-area').scrollTop = 0;
}

// ==================== MANAGE ====================
function addVerse() {
  const book = document.getElementById('inp-book').value.trim();
  const ch = document.getElementById('inp-chapter').value.trim();
  const vs = document.getElementById('inp-verse').value.trim();
  const content = document.getElementById('inp-content').value.trim();
  if (!book || !ch || !vs || !content) { alert('모든 항목을 입력해주세요.'); return; }

  if (editingId !== null) {
    const i = verses.findIndex(v => v.id === editingId);
    if (i !== -1) verses[i] = { ...verses[i], book, ch, vs, content };
    editingId = null;
    document.getElementById('form-title').textContent = '구절 추가';
    document.getElementById('form-submit-btn').textContent = '＋ 추가하기';
  } else {
    verses.push({ id: Date.now(), book, ch, vs, content, at: new Date().toLocaleDateString('ko-KR') });
  }

  save();
  clearForm();
  renderAll();
}

function clearForm() {
  ['inp-book','inp-chapter','inp-verse','inp-content'].forEach(id => document.getElementById(id).value = '');
  editingId = null;
  document.getElementById('form-title').textContent = '구절 추가';
  document.getElementById('form-submit-btn').textContent = '＋ 추가하기';
}

function editVerse(id) {
  const v = verses.find(x => x.id === id);
  if (!v) return;
  editingId = id;
  document.getElementById('inp-book').value = v.book;
  document.getElementById('inp-chapter').value = v.ch;
  document.getElementById('inp-verse').value = v.vs;
  document.getElementById('inp-content').value = v.content;
  document.getElementById('form-title').textContent = '구절 수정';
  document.getElementById('form-submit-btn').textContent = '✓ 수정 완료';
  document.getElementById('scroll-area').scrollTop = 0;
}

function deleteVerse(id) {
  if (!confirm('이 구절을 삭제할까요?')) return;
  verses = verses.filter(v => v.id !== id);
  save();
  renderAll();
}

function renderAll() {
  renderStats();
  renderVerseList();
  renderHistory();
}

function renderStats() {
  const wrap = document.getElementById('stats-row-wrap');
  if (!verses.length) { wrap.innerHTML = ''; return; }
  const books = new Set(verses.map(v => v.book)).size;
  wrap.innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${verses.length}</div><div class="stat-label">구절</div></div>
      <div class="stat-card"><div class="stat-num">${books}</div><div class="stat-label">성경 책</div></div>
      <div class="stat-card"><div class="stat-num">${sessionHistory.length}</div><div class="stat-label">완료 세션</div></div>
    </div>
  `;
}

function renderVerseList() {
  const badge = document.getElementById('verse-count-badge');
  badge.textContent = verses.length ? verses.length + '개' : '';
  renderBookList();
}

function renderBookList() {
  const bookList = document.getElementById('book-list');
  const detail = document.getElementById('verse-detail');
  bookList.style.display = 'block';
  detail.style.display = 'none';

  if (!verses.length) {
    bookList.innerHTML = '<div class="empty-state"><span class="empty-icon">📖</span><div class="empty-text">구절을 추가해보세요.<br>위 폼에 내용을 입력하시면 됩니다.</div></div>';
    return;
  }

  // Group by book
  const groups = {};
  const bookOrder = [];
  verses.forEach(function(v) {
    if (!groups[v.book]) { groups[v.book] = []; bookOrder.push(v.book); }
    groups[v.book].push(v);
  });
  const uniqueBooks = bookOrder.filter(function(b, i) { return bookOrder.indexOf(b) === i; });

  bookList.innerHTML = uniqueBooks.map(function(book) {
    const count = groups[book].length;
    const safeBook = book.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    return '<div class="verse-item" onclick="openBookDetail(this)" data-book="' + safeBook + '" style="cursor:pointer;align-items:center;">'
      + '<div class="verse-num-badge" style="font-size:20px;min-width:44px;padding:8px;">📗</div>'
      + '<div class="verse-body">'
      + '<div class="verse-ref">' + book + '</div>'
      + '<div class="verse-content">' + count + '구절 등록됨</div>'
      + '</div>'
      + '<div style="color:var(--text-muted);font-size:18px;padding-right:4px;">›</div>'
      + '</div>';
  }).join('');
}

function openBookDetail(el) {
  var book = typeof el === 'string' ? el : el.getAttribute('data-book');
  const bookList = document.getElementById('book-list');
  const detail = document.getElementById('verse-detail');
  const title = document.getElementById('verse-detail-title');
  const list = document.getElementById('verse-list');

  bookList.style.display = 'none';
  detail.style.display = 'block';
  title.textContent = book;

  const bookVerses = verses.filter(function(v) { return v.book === book; });
  list.innerHTML = bookVerses.map(function(v, i) {
    const safeBook = book.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    return '<div class="verse-item">'
      + '<div class="verse-num-badge">' + (i+1) + '<br>' + v.ch + ':' + v.vs + '</div>'
      + '<div class="verse-body">'
      + '<div class="verse-ref">' + v.book + ' ' + v.ch + ':' + v.vs + '</div>'
      + '<div class="verse-content">' + v.content + '</div>'
      + '</div>'
      + '<div class="verse-btns">'
      + '<button class="btn btn-ghost btn-sm" onclick="editVerse(' + v.id + ')">수정</button>'
      + '<button class="btn btn-danger" data-id="' + v.id + '" data-book="' + safeBook + '" onclick="deleteVerseInDetail(this)">삭제</button>'
      + '</div>'
      + '</div>';
  }).join('');

  document.getElementById('scroll-area').scrollTop = 0;
}

function closeBookDetail() {
  document.getElementById('book-list').style.display = 'block';
  document.getElementById('verse-detail').style.display = 'none';
  document.getElementById('scroll-area').scrollTop = 0;
}

function deleteVerseInDetail(el) {
  var id = parseInt(el.getAttribute('data-id'));
  var book = el.getAttribute('data-book');
  if (!confirm('이 구절을 삭제할까요?')) return;
  verses = verses.filter(function(v) { return v.id !== id; });
  save();
  renderStats();
  const badge = document.getElementById('verse-count-badge');
  badge.textContent = verses.length ? verses.length + '개' : '';
  const remaining = verses.filter(function(v) { return v.book === book; });
  if (remaining.length > 0) {
    openBookDetail(book);
  } else {
    closeBookDetail();
    renderBookList();
  }
}

// ==================== QUIZ ====================
function selectMode(mode) {
  quizMode = mode;
  document.getElementById('mode-seq').classList.toggle('selected', mode === 'sequential');
  document.getElementById('mode-rnd').classList.toggle('selected', mode === 'random');
}

function startQuiz() {
  if (!verses.length) { alert('먼저 구절을 등록해주세요.'); return; }
  const from = (parseInt(document.getElementById('range-from').value) || 1) - 1;
  const to = parseInt(document.getElementById('range-to').value) || verses.length;
  let queue = verses.slice(from, Math.min(verses.length, to));
  if (!queue.length) { alert('출제 범위를 확인해주세요.'); return; }
  if (quizMode === 'random') queue = [...queue].sort(() => Math.random() - 0.5);
  quizQueue = queue;
  quizIndex = 0;
  quizResults = [];
  document.getElementById('quiz-setup').style.display = 'none';
  document.getElementById('quiz-play').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  if (quizIndex >= quizQueue.length) { showComplete(); return; }
  const v = quizQueue[quizIndex];
  const pct = Math.round(quizIndex / quizQueue.length * 100);
  document.getElementById('quiz-prog-text').textContent = `${quizIndex + 1} / ${quizQueue.length}`;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('quiz-ref-disp').textContent = `${v.book} ${v.ch}:${v.vs}`;
  document.getElementById('quiz-input-area').value = '';
  document.getElementById('result-area').innerHTML = '';
  document.querySelector('.quiz-btn-row').style.display = 'flex';
  setTimeout(() => document.getElementById('quiz-input-area').focus(), 100);
}

function skipVerse() {
  quizResults.push({ verse: quizQueue[quizIndex], score: 0, skipped: true, ops: [] });
  quizIndex++;
  showQuestion();
}

function submitAnswer() {
  const input = document.getElementById('quiz-input-area').value.trim();
  if (!input) { alert('내용을 입력해주세요.'); return; }
  const v = quizQueue[quizIndex];
  const fuzzy = document.getElementById('fuzzy-check').checked;
  const result = grade(v.content, input, fuzzy);
  quizResults.push({ verse: v, ...result, skipped: false });
  showResult(v, result);
}

// ==================== GRADING ====================
function tok(str) { return str.replace(/[.,!?;:""''·]/g, '').split(/\s+/).filter(Boolean); }

function lev(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1}, (_,i) => [i, ...Array(n).fill(0)]);
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function match(a, b, fuzzy) { return a===b || (fuzzy && lev(a,b)<=1); }

function grade(answer, input, fuzzy) {
  const aw = tok(answer), iw = tok(input);
  const m = aw.length, n = iw.length;
  const dp = Array.from({length:m+1}, () => Array(n+1).fill(0));
  for (let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j] = match(aw[i-1],iw[j-1],fuzzy) ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j],dp[i][j-1]);
  const ops = [];
  let i=m, j=n;
  while(i>0||j>0) {
    if(i>0&&j>0&&match(aw[i-1],iw[j-1],fuzzy)) { ops.unshift({t:'ok',a:aw[i-1],b:iw[j-1]}); i--;j--; }
    else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])) { ops.unshift({t:'extra',b:iw[j-1]}); j--; }
    else { ops.unshift({t:'miss',a:aw[i-1]}); i--; }
  }
  const correct = ops.filter(o=>o.t==='ok').length;
  return { ops, correct, total: m, score: Math.round(correct/m*100) };
}

function showResult(v, result) {
  document.querySelector('.quiz-btn-row').style.display = 'none';
  const sc = result.score;
  const cls = sc===100?'score-perfect':sc>=70?'score-good':'score-bad';
  const em = sc===100?'🎉':sc>=70?'✅':'❌';
  const miss = result.ops.filter(o=>o.t==='miss').length;
  const extra = result.ops.filter(o=>o.t==='extra').length;
  const ok = result.ops.filter(o=>o.t==='ok').length;

  const diff = result.ops.map(o => {
    if (o.t==='ok') return `<span class="w-ok">${o.b}</span>`;
    if (o.t==='extra') return `<span class="w-extra">[+${o.b}]</span>`;
    if (o.t==='miss') return `<span class="w-miss">${o.a}</span><span class="w-ans">→${o.a}</span>`;
  }).join(' ');

  const isLast = quizIndex + 1 >= quizQueue.length;

  document.getElementById('result-area').innerHTML = `
    <div class="result-card">
      <div class="score-row">
        <div>
          <div class="score-big ${cls}">${em} ${sc}점</div>
          <div class="score-sub">${result.correct} / ${result.total} 단어</div>
        </div>
        <div class="score-badges">
          ${ok?`<span class="badge badge-green">✓ ${ok}개</span>`:''}
          ${miss?`<span class="badge badge-red">✗ ${miss}개</span>`:''}
          ${extra?`<span class="badge badge-blue">+ ${extra}개</span>`:''}
        </div>
      </div>
      <div class="diff-label">교정 결과 — 빨강: 누락·오답 / 파랑: 불필요</div>
      <div class="diff-text">${diff}</div>
      ${sc<100?`
        <div class="answer-box">
          <div class="answer-box-label">✦ 정답</div>
          <div class="answer-box-text">${v.content}</div>
        </div>
      `:''}
      <div class="result-actions">
        ${isLast
          ? `<button class="btn btn-primary" onclick="showComplete()">결과 보기 →</button>`
          : `<button class="btn btn-ghost" onclick="showComplete()">종료</button>
             <button class="btn btn-primary" onclick="nextVerse()">다음 →</button>`
        }
      </div>
    </div>
  `;
  document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function nextVerse() { quizIndex++; showQuestion(); }

function showComplete() {
  const total = quizResults.length;
  const avg = total ? Math.round(quizResults.reduce((s,r)=>s+(r.score||0),0)/total) : 0;
  const perfect = quizResults.filter(r=>r.score===100).length;
  const skipped = quizResults.filter(r=>r.skipped).length;
  sessionHistory.unshift({ date: new Date().toLocaleString('ko-KR'), mode: quizMode==='sequential'?'순서':'무작위', total, avg, perfect, skipped });
  saveHist();
  renderAll();

  const play = document.getElementById('quiz-play');
  play.innerHTML = `
    <div class="complete-wrap">
      <div class="complete-cross">✦ ✦ ✦</div>
      <div class="complete-title">암송 완료!</div>
      <div class="complete-sub">${total}개 구절 완료</div>
      <div class="complete-stats">
        <div class="complete-stat"><div class="complete-stat-num">${avg}</div><div class="complete-stat-label">평균 점수</div></div>
        <div class="complete-stat"><div class="complete-stat-num">${perfect}</div><div class="complete-stat-label">완벽 암송</div></div>
        <div class="complete-stat"><div class="complete-stat-num">${skipped}</div><div class="complete-stat-label">건너뜀</div></div>
      </div>
      <div class="result-list">
        ${quizResults.map(r=>`
          <div class="result-row">
            <span class="result-row-ref">${r.verse.book} ${r.verse.ch}:${r.verse.vs}</span>
            <span class="result-row-score ${r.score===100?'score-perfect':r.score>=70?'score-good':'score-bad'}">${r.skipped?'건너뜀':r.score+'점'}</span>
          </div>
        `).join('')}
      </div>
      <div class="complete-btns">
        <button class="btn btn-ghost" onclick="endQuiz()">설정으로</button>
        <button class="btn btn-primary" onclick="restartQuiz()">다시 암송</button>
      </div>
    </div>
  `;
  document.getElementById('scroll-area').scrollTop = 0;
}

function endQuiz() {
  document.getElementById('quiz-setup').style.display = 'block';
  rebuildPlayArea();
}

function restartQuiz() {
  rebuildPlayArea();
  startQuiz();
}

function rebuildPlayArea() {
  document.getElementById('quiz-play').style.display = 'none';
  document.getElementById('quiz-play').innerHTML = `
    <div class="quiz-topbar">
      <div class="quiz-progress-text" id="quiz-prog-text"></div>
      <button class="btn btn-ghost btn-sm" onclick="endQuiz()">✕ 종료</button>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="prog-fill"></div></div>
    <div class="quiz-ref-label">암송할 구절</div>
    <div class="quiz-ref" id="quiz-ref-disp"></div>
    <textarea class="quiz-input" id="quiz-input-area" placeholder="외운 내용을 입력하세요..."></textarea>
    <div class="quiz-btn-row">
      <button class="btn btn-ghost" onclick="skipVerse()">건너뛰기</button>
      <button class="btn btn-primary" onclick="submitAnswer()">채점하기 ✓</button>
    </div>
    <div id="result-area"></div>
  `;
}

// ==================== HISTORY ====================
function renderHistory() {
  const list = document.getElementById("history-list");
  const deleteBtn = sessionHistory.length
    ? '<button class="btn btn-danger btn-sm" onclick="clearAllHistory()" style="margin-top:4px;">전체 삭제</button>'
    : '';
  const header = '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;">'
    + '<div><div class="section-title">암송 기록</div><div class="section-desc">세션별 결과를 확인하세요</div></div>'
    + deleteBtn + '</div>';
  if (!sessionHistory.length) {
    list.innerHTML = header + '<div class="empty-state"><span class="empty-icon">📊</span><div class="empty-text">아직 완료한 세션이 없습니다.</div></div>';
    return;
  }
  const items = sessionHistory.map(function(s, i) {
    const scoreClass = s.avg===100 ? 'score-perfect' : s.avg>=70 ? 'score-good' : 'score-bad';
    return '<div class="history-item">'
      + '<div class="history-score ' + scoreClass + '">' + s.avg + '점</div>'
      + '<div class="history-info">'
      + '<div class="history-date">' + s.date + ' · ' + s.mode + ' 모드</div>'
      + '<div class="history-detail">총 ' + s.total + '구절 · 완벽 ' + s.perfect + '개 · 건너뜀 ' + s.skipped + '개</div>'
      + '</div>'
      + '<button class="btn btn-danger" style="flex-shrink:0;padding:6px 10px;font-size:16px;border:none;" onclick="deleteHistory(' + i + ')">🗑</button>'
      + '</div>';
  }).join('');
  list.innerHTML = header + items;
}

function deleteHistory(index) {
  if (!confirm('이 기록을 삭제할까요?')) return;
  sessionHistory.splice(index, 1);
  saveHist();
  renderHistory();
  renderStats();
}

function clearAllHistory() {
  if (!sessionHistory.length) return;
  if (!confirm(`기록 ${sessionHistory.length}개를 모두 삭제할까요?`)) return;
  sessionHistory = [];
  saveHist();
  renderHistory();
  renderStats();
}

// ==================== PWA INSTALL ====================
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstall = e;
  showInstallBanner();
});

function showInstallBanner() {
  const wrap = document.getElementById('install-banner-wrap');
  wrap.innerHTML = `
    <div class="install-banner">
      <span class="install-icon">📲</span>
      <div class="install-text">
        <strong>앱으로 설치하기</strong>
        <span>홈 화면에 추가하면 오프라인에서도 사용 가능해요</span>
      </div>
      <div class="install-btns">
        <button class="btn btn-primary btn-sm" onclick="doInstall()">설치</button>
        <button class="btn btn-ghost btn-sm" onclick="dismissInstall()">닫기</button>
      </div>
    </div>
  `;
}

function doInstall() {
  if (!deferredInstall) return;
  deferredInstall.prompt();
  deferredInstall.userChoice.then(() => {
    deferredInstall = null;
    document.getElementById('install-banner-wrap').innerHTML = '';
  });
}

function dismissInstall() {
  document.getElementById('install-banner-wrap').innerHTML = '';
}

// ==================== SW REGISTER ====================
